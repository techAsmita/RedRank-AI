ai_usage_summary: |
  Claude and ChatGPT were used as senior engineering collaborators for
  architecture design, code review, debugging, and implementation guidance.
  No candidate data was fed to any LLM during ranking. All ranking logic
  is deterministic and runs entirely offline.

methodology_summary: |
  RedRank AI transforms each candidate into a CandidateIntelligence object
  capturing technical depth, career trajectory, behavioral signals, and risk
  flags. A deterministic Evidence Graph connects candidate signals to JD
  requirements without embeddings or similarity search. Eight independent
  Decision Policies evaluate fit across technical, production readiness,
  career, hiring readiness, professional signals, evidence strength, JD intent
  coverage, and risk dimensions. A Decision Fusion Engine applies hard gates
  (pure research disqualifier, keyword-only profiles), anchor scoring via
  minimum of four policy confidences enforcing broad competence, and weighted
  booster signals for fine-grained ordering. Recruiter response rate acts as
  an independent score multiplier. The system explicitly models the JD's
  warning against keyword-trap candidates by rewarding evidence-corroborated
  skills over keyword density. Runtime approximately 120 seconds for 100,000
  candidates on CPU with no external API calls.

